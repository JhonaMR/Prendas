    <!-- Early Brand Detection - MUST RUN BEFORE MANIFEST LOAD -->
    <script>
      (function() {
        const port = window.location.port;
        const isMelas = port === '5174' || port === '3001';
        const manifestFile = isMelas ? 'manifest-melas.json' : 'manifest.json';
        
        // Crear el link del manifest dinámicamente ANTES de que se cargue
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = `/${manifestFile}?t=${Date.now()}`;
        document.head.appendChild(manifestLink);
        
        console.log(`🔧 [EARLY] Manifest cargado: ${manifestFile}`);
        
        // Cambiar favicon dinámicamente
        const faviconFile = isMelas ? 'favicon-melas.ico' : 'favicon.ico';
        const favicon = document.querySelector('link[rel="icon"]');
        if (favicon) {
          favicon.href = `/${faviconFile}?t=${Date.now()}`;
        }
        
        console.log(`🔧 [EARLY] Favicon cargado: ${faviconFile}`);
        
        // Guardar config para uso posterior
        window.BRAND_CONFIG = {
          name: isMelas ? 'Melas' : 'Plow',
          short: isMelas ? 'melas' : 'plow',
          color: isMelas ? '#ef4444' : '#3b82f6',
          description: isMelas ? 'Sistema de Gestión - Melas' : 'Sistema de Gestión - Plow',
          isMelas: isMelas,
          isPlow: !isMelas
        };
      })();
    </script>
    
    <!-- PWA Manifest - Will be replaced by early detection script above -->

    <script>
      // Actualizar metadatos según la marca detectada
      // BRAND_CONFIG ya fue creado en el early detection script
      (function() {
        // Usar BRAND_CONFIG que ya fue creado
        const brand = window.BRAND_CONFIG || {
          name: 'Plow',
          color: '#3b82f6',
          description: 'Sistema de Gestión - Plow'
        };
        
        // Actualizar title
        document.getElementById('page-title').textContent = `${brand.name} - Ventas y producción`;
        
        // Actualizar colores
        document.getElementById('theme-color').setAttribute('content', brand.color);
        document.getElementById('ms-tile-color').setAttribute('content', brand.color);
        document.getElementById('mask-icon').setAttribute('color', brand.color);
        
        // Actualizar nombres
        document.getElementById('app-title').setAttribute('content', brand.name);
        document.getElementById('app-name').setAttribute('content', brand.name);
        
        // Actualizar descripción
        document.getElementById('page-description').setAttribute('content', brand.description);
        
        console.log(`✅ Metadatos actualizados para: ${brand.name}`);
      })();
    </script>
